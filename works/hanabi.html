<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花火 | うつろい</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300&family=Shippori+Mincho:wght@300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#05040e; cursor:none; }
  canvas { position:fixed; inset:0; display:block; z-index:1; }

  #cursor {
    position:fixed; width:6px; height:6px;
    background:rgba(255,220,150,0.9); border-radius:50%;
    pointer-events:none; z-index:100;
    transform:translate(-50%,-50%);
    box-shadow:0 0 10px 4px rgba(255,180,60,0.3);
  }

  #back {
    position:fixed; top:28px; left:36px; z-index:50;
    font-family:'Noto Serif JP',serif; font-weight:200;
    font-size:0.65rem; letter-spacing:0.35em;
    color:rgba(255,200,120,0.3); text-decoration:none;
    transition:color .3s;
  }
  #back:hover { color:rgba(255,200,120,0.8); }

  #title {
    position:fixed; bottom:44px; left:50%;
    transform:translateX(-50%);
    text-align:center; pointer-events:none; z-index:50;
  }
  #title h1 {
    font-family:'Shippori Mincho',serif; font-weight:300;
    font-size:clamp(1.4rem,3vw,2.2rem); letter-spacing:0.4em;
    color:rgba(255,210,120,0.4);
    text-shadow:0 0 30px rgba(255,160,40,0.15);
  }

  #finale-btn {
    position:fixed; bottom:44px; right:40px; z-index:50;
    font-family:'Noto Serif JP',serif; font-weight:200;
    font-size:0.6rem; letter-spacing:0.3em;
    color:rgba(255,200,120,0.35); cursor:none;
    border:1px solid rgba(255,200,120,0.2);
    padding:8px 18px; border-radius:20px;
    background:transparent;
    transition:color .3s, border-color .3s, opacity .3s;
  }
  #finale-btn:hover { color:rgba(255,200,120,0.9); border-color:rgba(255,200,120,0.6); }
  #finale-btn.active { opacity:0.3; pointer-events:none; }

  #type-label {
    position:fixed; top:28px; right:40px; z-index:50;
    font-family:'Noto Serif JP',serif; font-weight:200;
    font-size:0.58rem; letter-spacing:0.3em;
    color:rgba(255,200,120,0.4);
    pointer-events:none;
    transition:opacity .6s;
  }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="c"></canvas>
<a href="../index.html" id="back">← うつろい</a>
<div id="title"><h1>花火</h1></div>
<button id="finale-btn">錦冠乱打</button>
<div id="type-label"></div>

<script>
const canvas    = document.getElementById('c');
const ctx       = canvas.getContext('2d');
const cursorEl  = document.getElementById('cursor');
const finaleBtn = document.getElementById('finale-btn');
const typeLbl   = document.getElementById('type-label');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

/* ── Palettes ── */
const PALETTES = [
  [{r:255,g:60,b:80},  {r:255,g:120,b:80}, {r:255,g:210,b:180}],
  [{r:255,g:200,b:40}, {r:255,g:160,b:20}, {r:255,g:245,b:180}],
  [{r:200,g:220,b:255},{r:160,g:200,b:255},{r:245,g:248,b:255}],
  [{r:60, g:140,b:255},{r:100,g:180,b:255},{r:180,g:220,b:255}],
  [{r:60, g:220,b:100},{r:100,g:255,b:140},{r:180,g:255,b:200}],
  [{r:180,g:60, b:255},{r:220,g:100,b:255},{r:240,g:180,b:255}],
  [{r:255,g:120,b:20}, {r:255,g:180,b:60}, {r:255,g:230,b:160}],
  [{r:255,g:255,b:200},{r:255,g:240,b:120},{r:255,g:255,b:255}],
];

const TYPES = ['botan','kiku','yanagi','warimono','nishiki'];
const TYPE_NAMES = {botan:'牡丹',kiku:'菊',yanagi:'柳',warimono:'割物',nishiki:'錦冠'};

/* ── Stars ── */
const STARS = Array.from({length:100}, ()=>({
  x:Math.random(), y:Math.random()*0.72,
  r:Math.random()*0.8+0.2,
  a:Math.random()*0.4+0.1,
  tw:Math.random()*Math.PI*2,
  ts:0.008+Math.random()*0.018,
}));

/* ── Flash ── */
let flashes = [];
function addFlash(x,y,col,size=1){
  flashes.push({x,y,r:0,alpha:0.55*size,col});
}

/* ── Particle ── */
class Particle {
  constructor(x,y,col,kind,opts={}){
    this.x=x; this.y=y; this.col=col; this.kind=kind;
    const angle = opts.angle ?? Math.random()*Math.PI*2;
    const spd   = opts.spd   ?? (2+Math.random()*5);
    this.vx = Math.cos(angle)*spd;
    this.vy = Math.sin(angle)*spd+(opts.vyBias??0);
    this.life  = 1;
    this.decay = opts.decay ?? (0.016+Math.random()*0.01);
    this.r     = opts.r     ?? (1.2+Math.random()*0.8);
    this.grav  = opts.grav  ?? 0.055;
    this.drag  = opts.drag  ?? 0.986;
    this.trail = [];
    this.trailMax      = opts.trailMax ?? 6;
    this.secondaryDone = false;
    this._palette      = opts.palette ?? null;
    this._size         = opts.size    ?? 1;
  }

  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>this.trailMax) this.trail.shift();
    this.vy += this.grav;
    this.vx *= this.drag; this.vy *= this.drag;
    this.x  += this.vx;  this.y  += this.vy;
    this.life -= this.decay;
  }

  draw(){
    const {r,g,b}=this.col;
    const a=Math.max(0,this.life);
    // Trail
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i];
      const p=i/this.trail.length;
      ctx.beginPath(); ctx.arc(t.x,t.y,this.r*p*0.55,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},${a*p*0.45})`; ctx.fill();
    }
    // Soft glow — single larger circle, no RadialGradient
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r*5,0,Math.PI*2);
    ctx.fillStyle=`rgba(${r},${g},${b},${a*0.06})`; ctx.fill();
    // Core
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,240,${a*0.92})`; ctx.fill();
  }

  isDead(){ return this.life<=0; }
}

/* ── Explode ── */
function explode(x,y,palette,type,size=1){
  const parts=[];
  addFlash(x,y,palette[2],size);

  if(type==='botan'){
    const n=Math.round((50+Math.random()*20)*size);
    for(let i=0;i<n;i++){
      const ci=Math.floor(Math.random()*palette.length);
      parts.push(new Particle(x,y,palette[ci],'botan',{
        spd:(3+Math.random()*4)*size, r:1.2+Math.random()*0.8,
        decay:0.016+Math.random()*0.008, trailMax:3,
      }));
    }
  }
  else if(type==='kiku'){
    const n=Math.round((45+Math.random()*20)*size);
    for(let i=0;i<n;i++){
      const ci=i%2;
      parts.push(new Particle(x,y,palette[ci],'kiku',{
        spd:(4+Math.random()*5)*size, r:1.0+Math.random()*0.6,
        decay:0.010+Math.random()*0.005, drag:0.978,
        trailMax:10, grav:0.038,
      }));
    }
  }
  else if(type==='yanagi'){
    const n=Math.round((45+Math.random()*20)*size);
    for(let i=0;i<n;i++){
      const ci=Math.floor(Math.random()*palette.length);
      parts.push(new Particle(x,y,palette[ci],'yanagi',{
        spd:(2.5+Math.random()*3.5)*size,
        vyBias:-1.5,
        r:0.9+Math.random()*0.5,
        decay:0.009+Math.random()*0.005, drag:0.975,
        grav:0.058, trailMax:14,
      }));
    }
  }
  else if(type==='nishiki'){
    const n=Math.round((50+Math.random()*15)*size);
    for(let i=0;i<n;i++){
      const angle = Math.random()*Math.PI*2;
      const spd   = (2+Math.random()*4)*size;
      const ci    = Math.floor(Math.random()*palette.length);
      parts.push(new Particle(x,y,palette[ci],'nishiki',{
        angle, spd,
        vyBias: -2,
        r: 1.0+Math.random()*0.6,
        decay: 0.004+Math.random()*0.003,
        drag:  0.960,
        grav:  0.10,
        trailMax: 22,
      }));
    }
  }
  else if(type==='warimono'){
    const n=Math.round((32+Math.random()*12)*size);
    for(let i=0;i<n;i++){
      const angle=(i/n)*Math.PI*2;
      const ci=i%palette.length;
      const p=new Particle(x,y,palette[ci],'warimono',{
        angle, spd:(4+Math.random()*2)*size,
        r:1.4, decay:0.028, drag:0.97, grav:0.035, trailMax:6,
        palette, size:size*0.5,
      });
      parts.push(p);
    }
  }
  return parts;
}

/* ── Warimono secondary burst ── */
function secondaryBurst(p){
  const parts=[];
  const pal=p._palette; if(!pal) return parts;
  const n=8+Math.floor(Math.random()*6);
  for(let i=0;i<n;i++){
    const ci=Math.floor(Math.random()*pal.length);
    parts.push(new Particle(p.x,p.y,pal[ci],'botan',{
      spd:(1.5+Math.random()*2)*p._size,
      r:0.8, decay:0.022+Math.random()*0.01,
      trailMax:4, grav:0.07,
    }));
  }
  return parts;
}

/* ── Rocket ── */
class Rocket {
  constructor(tx,ty,typeOverride,sizeOverride){
    this.x  = tx+(Math.random()-.5)*60;
    this.y  = H+10;
    this.tx = tx;
    this.ty = ty ?? H*0.12+Math.random()*H*0.48;
    const dx=this.tx-this.x, dy=this.ty-this.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const spd=9+Math.random()*4;
    this.vx=dx/dist*spd; this.vy=dy/dist*spd;
    this.palette=PALETTES[Math.floor(Math.random()*PALETTES.length)];
    this.type=typeOverride??TYPES[Math.floor(Math.random()*TYPES.length)];
    this.size=sizeOverride??1;
    this.trail=[]; this.exploded=false;
  }

  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>14) this.trail.shift();
    this.vy+=0.1;
    this.x+=this.vx; this.y+=this.vy;
    if(this.vy>=0||Math.abs(this.ty-this.y)<10) this.exploded=true;
  }

  draw(){
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i];
      const p=i/this.trail.length;
      const c=this.palette[0];
      ctx.beginPath(); ctx.arc(t.x,t.y,2*p,0,Math.PI*2);
      ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},${p*0.55})`; ctx.fill();
    }
    const c=this.palette[2];
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,5);
    g.addColorStop(0,'rgba(255,255,240,0.9)');
    g.addColorStop(0.4,`rgba(${c.r},${c.g},${c.b},0.6)`);
    g.addColorStop(1,`rgba(${c.r},${c.g},${c.b},0)`);
    ctx.beginPath(); ctx.arc(this.x,this.y,5,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
  }
}

/* ── State ── */
let rockets   = [];
let particles = [];
let autoTimer = 0;
let nextAuto  = 150+Math.floor(Math.random()*150);
let finaleActive = false;

/* ── Gold palette for finale ── */
const GOLD_PALETTE = [
  {r:255,g:220,b:80},
  {r:255,g:200,b:40},
  {r:255,g:250,b:180},
];

/* ── Finale ── */
function launchFinale(){
  if(finaleActive) return;
  finaleActive=true;
  finaleBtn.classList.add('active');
  // Clear existing rockets cleanly
  rockets = [];
  const total=12;
  for(let i=0;i<total;i++){
    setTimeout(()=>{
      const x = W*0.08 + Math.random()*W*0.84;
      const y = H*0.08 + Math.random()*H*0.32;
      const rk = new Rocket(x, y, 'nishiki', 1.0+Math.random()*0.4);
      rk.palette = GOLD_PALETTE;
      rockets.push(rk);
    }, i*280+Math.random()*120);
  }
  setTimeout(()=>{
    finaleActive=false;
    finaleBtn.classList.remove('active');
    autoTimer=0;
    nextAuto=150+Math.floor(Math.random()*100);
  }, total*280+3000);
}

/* ── Type label ── */
let labelTimer=null;
function showType(type){
  typeLbl.textContent=TYPE_NAMES[type]??'';
  typeLbl.style.opacity='1';
  clearTimeout(labelTimer);
  labelTimer=setTimeout(()=>{ typeLbl.style.opacity='0'; },1400);
}

/* ── Background ── */
function drawBG(){
  ctx.fillStyle='rgba(5,4,14,0.2)';
  ctx.fillRect(0,0,W,H);
  STARS.forEach(s=>{
    s.tw+=s.ts;
    const a=s.a*(0.5+0.5*Math.sin(s.tw));
    ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(220,225,255,${a})`; ctx.fill();
  });
  const h=ctx.createLinearGradient(0,H*0.8,0,H);
  h.addColorStop(0,'rgba(30,15,50,0)');
  h.addColorStop(1,'rgba(60,30,90,0.15)');
  ctx.fillStyle=h; ctx.fillRect(0,H*0.8,W,H*0.2);
}

/* ── Render ── */
function render(){
  drawBG();

  flashes=flashes.filter(f=>{
    f.r+=14; f.alpha-=0.038;
    if(f.alpha<=0) return false;
    const {r,g,b}=f.col;
    const g2=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r);
    g2.addColorStop(0,`rgba(255,255,240,${f.alpha*0.5})`);
    g2.addColorStop(0.3,`rgba(${r},${g},${b},${f.alpha*0.25})`);
    g2.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
    ctx.fillStyle=g2; ctx.fill();
    return true;
  });

  rockets=rockets.filter(rk=>{
    rk.update(); rk.draw();
    if(rk.exploded){
      particles.push(...explode(rk.x,rk.y,rk.palette,rk.type,rk.size));
      return false;
    }
    return true;
  });

  const newParts=[];
  particles=particles.filter(p=>{
    p.update(); p.draw();
    if(p.kind==='warimono'&&!p.secondaryDone&&p.life<0.44){
      p.secondaryDone=true;
      newParts.push(...secondaryBurst(p));
    }
    return !p.isDead();
  });
  particles.push(...newParts);

  autoTimer++;
  if(autoTimer>=nextAuto&&!finaleActive){
    autoTimer=0;
    nextAuto=140+Math.floor(Math.random()*160);
    const type=TYPES[Math.floor(Math.random()*TYPES.length)];
    rockets.push(new Rocket(W*0.15+Math.random()*W*0.7,undefined,type));
  }

  requestAnimationFrame(render);
}

/* ── Events ── */
document.addEventListener('mousemove',e=>{
  cursorEl.style.left=e.clientX+'px';
  cursorEl.style.top =e.clientY+'px';
});

window.addEventListener('click',e=>{
  if(e.target===finaleBtn) return;
  const type=TYPES[Math.floor(Math.random()*TYPES.length)];
  showType(type);
  const n=1+(Math.random()<0.28?1:0);
  for(let i=0;i<n;i++) rockets.push(new Rocket(e.clientX,e.clientY,type));
});

window.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  const type=TYPES[Math.floor(Math.random()*TYPES.length)];
  rockets.push(new Rocket(t.clientX,t.clientY,type));
},{passive:true});

finaleBtn.addEventListener('click',e=>{
  e.stopPropagation();
  launchFinale();
});

window.addEventListener('resize',()=>{
  W=canvas.width =window.innerWidth;
  H=canvas.height=window.innerHeight;
});

// Seed — one of each type
setTimeout(()=>{
  TYPES.forEach((type,i)=>{
    setTimeout(()=>{
      rockets.push(new Rocket(W*0.15+Math.random()*W*0.7,undefined,type));
    },i*500);
  });
},400);

render();
</script>
</body>
</html>
