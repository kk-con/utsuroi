<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蛍 — Hotaru | うつろい</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300&family=Shippori+Mincho:wght@300&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; cursor:none; }
  canvas { position:fixed; inset:0; display:block; }

  #cursor {
    position:fixed;
    width:5px; height:5px;
    background:rgba(200,255,160,0.85);
    border-radius:50%;
    pointer-events:none;
    z-index:100;
    transform:translate(-50%,-50%);
    box-shadow:0 0 8px 3px rgba(160,255,120,0.3);
  }

  #back {
    position:fixed; top:28px; left:36px; z-index:50;
    font-family:'Noto Serif JP',serif; font-weight:200;
    font-size:0.65rem; letter-spacing:0.35em;
    color:rgba(160,255,120,0.3); text-decoration:none;
    transition:color .3s;
  }
  #back:hover { color:rgba(160,255,120,0.8); }

  #title {
    position:fixed; bottom:44px; left:50%;
    transform:translateX(-50%);
    text-align:center; pointer-events:none; z-index:50;
  }
  #title h1 {
    font-family:'Shippori Mincho',serif; font-weight:300;
    font-size:clamp(1.4rem,3vw,2.2rem); letter-spacing:0.4em;
    color:rgba(160,255,120,0.45);
    text-shadow:0 0 30px rgba(120,210,80,0.2);
  }
  #title p {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:0.72rem; letter-spacing:0.35em;
    color:rgba(160,255,120,0.2); margin-top:6px;
  }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="c"></canvas>
<a href="../index.html" id="back">← うつろい</a>
<div id="title">
  <h1>蛍</h1>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

const mouse = { x: W/2, y: H/2, vx:0, vy:0, speed:0 };
let lastMX = mouse.x, lastMY = mouse.y;
let stillTimer = null;
let isStill = false;
const STILL_DELAY = 800;

/* ── Colours ── */
const COLS = [
  {r:155,g:255,b:100},
  {r:195,g:255,b:80 },
  {r:115,g:225,b:155},
  {r:175,g:240,b:55 },
];

/* ── Sync glow state ── */
let syncActive = false;
let syncAlpha  = 0;   // 0→1→0

/* ── Firefly ── */
class Firefly {
  constructor() { this.reset(true); }

  reset(scattered) {
    this.x  = scattered ? Math.random()*W : Math.random()*W;
    this.y  = scattered ? Math.random()*H*0.88 : Math.random()*H*0.88;
    this.vx = (Math.random()-.5)*0.5;
    this.vy = (Math.random()-.5)*0.45 - 0.04;
    this.col      = COLS[Math.floor(Math.random()*COLS.length)];
    this.phase    = Math.random()*Math.PI*2;
    this.pulseSpd = 0.016 + Math.random()*0.024;
    this.baseAlpha= 0.32 + Math.random()*0.48;
    this.alpha    = this.baseAlpha;
    this.r        = 1.4 + Math.random()*1.9;
    this.wander   = Math.random()*Math.PI*2;
    this.wanderSpd= 0.016 + Math.random()*0.026;
    this.trail    = [];
    this.trailMax = 9 + Math.floor(Math.random()*13);
    // sync
    this.syncPhase  = Math.random()*Math.PI*2; // individual offset for wave
  }

  get dist() {
    const dx=this.x-mouse.x, dy=this.y-mouse.y;
    return Math.sqrt(dx*dx+dy*dy);
  }

  update() {
    // Trail
    this.trail.push({x:this.x, y:this.y, a:this.alpha});
    if (this.trail.length > this.trailMax) this.trail.shift();

    // Base pulse
    this.phase += this.pulseSpd;
    let baseA = this.baseAlpha * (0.45 + 0.55*Math.sin(this.phase));

    // Sync glow: ripple outward from mouse position
    if (syncActive && syncAlpha > 0) {
      // Distance-based delay so ripple propagates outward
      const d   = this.dist;
      const delay = d * 0.003;
      const wave  = Math.max(0, Math.sin((syncAlpha * Math.PI * 2) - delay));
      baseA = Math.min(1, baseA + wave * 0.85);
    }
    this.alpha = baseA;

    // Mouse attract when still
    const d = this.dist;
    if (isStill && d < 160) {
      const dx = mouse.x - this.x, dy = mouse.y - this.y;
      const force = (160 - d) / 160 * 0.009;
      this.vx += (dx/d)*force*d*0.06;
      this.vy += (dy/d)*force*d*0.06;
    }

    // Wander
    this.wander += (Math.random()-.5)*this.wanderSpd;
    this.vx += Math.cos(this.wander)*0.011;
    this.vy += Math.sin(this.wander)*0.011 - 0.003;

    // Speed cap
    const spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    const max  = isStill && d < 160 ? 1.1 : 0.82;
    if (spd > max) { this.vx=this.vx/spd*max; this.vy=this.vy/spd*max; }

    this.vx *= 0.986;
    this.vy *= 0.986;
    this.x  += this.vx;
    this.y  += this.vy;

    // Wrap
    if (this.x < -20) this.x=W+20;
    if (this.x > W+20) this.x=-20;
    if (this.y < -20) this.y=H+20;
    if (this.y > H+20) this.y=-20;
  }

  draw() {
    const {r,g,b} = this.col;

    // Trail
    for (let i=0;i<this.trail.length;i++) {
      const t=this.trail[i], p=i/this.trail.length;
      ctx.beginPath();
      ctx.arc(t.x,t.y,this.r*p*0.55,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},${t.a*p*0.28})`;
      ctx.fill();
    }

    // Outer glow
    const gr = this.r * (syncActive && this.alpha > 0.7 ? 18 : 11);
    const glow=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,gr);
    glow.addColorStop(0,  `rgba(${r},${g},${b},${this.alpha*0.4})`);
    glow.addColorStop(0.3,`rgba(${r},${g},${b},${this.alpha*0.12})`);
    glow.addColorStop(1,  `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(this.x,this.y,gr,0,Math.PI*2);
    ctx.fillStyle=glow; ctx.fill();

    // Core
    const core=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2.2);
    core.addColorStop(0,  `rgba(240,255,210,${this.alpha})`);
    core.addColorStop(0.4,`rgba(${r},${g},${b},${this.alpha*0.9})`);
    core.addColorStop(1,  `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r*2.2,0,Math.PI*2);
    ctx.fillStyle=core; ctx.fill();
  }
}

/* ── Background ── */
function drawBG() {
  const bg=ctx.createRadialGradient(W*0.5,H*0.3,0,W*0.5,H*0.5,H*1.1);
  bg.addColorStop(0,'#020e05');
  bg.addColorStop(0.5,'#010b03');
  bg.addColorStop(1,'#000601');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Subtle ambient green tint
  const amb=ctx.createRadialGradient(W*0.4,H*0.4,0,W*0.4,H*0.4,W*0.7);
  amb.addColorStop(0,'rgba(30,80,40,0.08)');
  amb.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=amb; ctx.fillRect(0,0,W,H);

  // Vignette
  const vign=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.9);
  vign.addColorStop(0,'rgba(0,0,0,0)');
  vign.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=vign; ctx.fillRect(0,0,W,H);
}

/* ── Init ── */
const fireflies = Array.from({length:55},()=>new Firefly());

/* ── Render ── */
function render() {
  drawBG();

  // Advance sync wave
  if (syncActive) {
    syncAlpha += 0.012;
    if (syncAlpha >= 1) { syncActive=false; syncAlpha=0; }
  }

  fireflies.forEach(f=>{ f.update(); f.draw(); });
  requestAnimationFrame(render);
}

/* ── Mouse ── */
window.addEventListener('mousemove', e=>{
  const dx=e.clientX-lastMX, dy=e.clientY-lastMY;
  mouse.speed=Math.sqrt(dx*dx+dy*dy);
  mouse.x=e.clientX; mouse.y=e.clientY;
  lastMX=e.clientX; lastMY=e.clientY;

  cursorEl.style.left=e.clientX+'px';
  cursorEl.style.top =e.clientY+'px';

  isStill=false;
  clearTimeout(stillTimer);
  stillTimer=setTimeout(()=>{ isStill=true; mouse.speed=0; }, STILL_DELAY);
});

window.addEventListener('mouseleave',()=>{ isStill=false; clearTimeout(stillTimer); });

/* ── Click: trigger sync glow ── */
window.addEventListener('click',()=>{
  syncActive=true;
  syncAlpha=0;
});

/* ── Touch ── */
window.addEventListener('touchmove',e=>{
  const t=e.touches[0];
  mouse.x=t.clientX; mouse.y=t.clientY;
  isStill=false; clearTimeout(stillTimer);
  stillTimer=setTimeout(()=>{ isStill=true; },STILL_DELAY);
},{passive:true});
window.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  mouse.x=t.clientX; mouse.y=t.clientY;
  syncActive=true; syncAlpha=0;
},{passive:true});
window.addEventListener('touchend',()=>{ isStill=false; clearTimeout(stillTimer); },{passive:true});

window.addEventListener('resize',()=>{
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
});

render();
</script>
</body>
</html>
