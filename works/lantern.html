<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灯籠 | うつろい</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300&family=Shippori+Mincho:wght@300&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#06050f; cursor:none; }
  canvas { position:fixed; inset:0; display:block; z-index:1; }

  #cursor {
    position:fixed; width:6px; height:6px;
    background:rgba(255,210,120,0.9); border-radius:50%;
    pointer-events:none; z-index:100;
    transform:translate(-50%,-50%);
    box-shadow:0 0 10px 4px rgba(255,180,60,0.3);
  }

  #back {
    position:fixed; top:28px; left:36px; z-index:50;
    font-family:'Noto Serif JP',serif; font-weight:200;
    font-size:0.65rem; letter-spacing:0.35em;
    color:rgba(255,200,100,0.3); text-decoration:none;
    transition:color .3s;
  }
  #back:hover { color:rgba(255,200,100,0.8); }

  #title {
    position:fixed; bottom:44px; left:50%;
    transform:translateX(-50%);
    text-align:center; pointer-events:none; z-index:50;
  }
  #title h1 {
    font-family:'Shippori Mincho',serif; font-weight:300;
    font-size:clamp(1.4rem,3vw,2.2rem); letter-spacing:0.4em;
    color:rgba(255,210,130,0.45);
    text-shadow:0 0 30px rgba(255,160,40,0.2);
  }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="c"></canvas>
<a href="../index.html" id="back">← うつろい</a>
<div id="title"><h1>灯籠</h1></div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

const mouse = { x: W/2, y: H/2 };

/* ── Lantern colours ── */
const LANTERN_COLS = [
  { body:'#e8853a', glow:'255,140,50',  paper:'#f5c87a' },
  { body:'#c84b6e', glow:'220,80,120',  paper:'#f0a0b8' },
  { body:'#d4782a', glow:'240,130,40',  paper:'#f2d090' },
  { body:'#a05ab8', glow:'180,100,210', paper:'#d8b0e8' },
  { body:'#3a8ac8', glow:'80,160,230',  paper:'#a8d0f0' },
];

/* ── Star field ── */
const STARS = Array.from({length:180}, ()=>({
  x: Math.random()*1, y: Math.random()*0.75,
  r: Math.random()*0.9+0.2,
  a: Math.random()*0.5+0.1,
  twinkle: Math.random()*Math.PI*2,
  twinkleSpd: 0.01+Math.random()*0.02,
}));

/* ── Lantern class ── */
class Lantern {
  constructor(x, y, auto) {
    this.x   = x ?? W*0.2 + Math.random()*W*0.6;
    this.y   = y ?? H + 60;
    this.col = LANTERN_COLS[Math.floor(Math.random()*LANTERN_COLS.length)];

    // Size
    this.w = 22 + Math.random()*16;
    this.h = this.w * 1.4;

    // Movement
    this.vy      = -(0.28 + Math.random()*0.22);  // rise speed
    this.vx      = (Math.random()-0.5)*0.3;
    this.drift   = Math.random()*Math.PI*2;
    this.driftSpd= 0.008 + Math.random()*0.008;
    this.driftAmp= 0.18 + Math.random()*0.22;

    // Sway
    this.sway    = Math.random()*Math.PI*2;
    this.swaySpd = 0.018 + Math.random()*0.015;
    this.swayAmp = 0.012 + Math.random()*0.01;

    // Glow pulse
    this.phase   = Math.random()*Math.PI*2;
    this.pulseSpd= 0.025 + Math.random()*0.02;
    this.baseGlow= 0.55 + Math.random()*0.3;
    this.glowR   = 0;

    // Flame flicker
    this.flicker = Math.random()*Math.PI*2;
    this.flickSpd= 0.08 + Math.random()*0.06;

    // Life
    this.alpha = 0;        // fade in
    this.fadeIn= true;
    this.dead  = false;
  }

  update() {
    // Fade in on launch
    if (this.fadeIn) {
      this.alpha += 0.025;
      if (this.alpha >= 1) { this.alpha=1; this.fadeIn=false; }
    }

    // Drift
    this.drift += this.driftSpd;
    this.sway  += this.swaySpd;
    this.x += this.vx + Math.sin(this.drift)*this.driftAmp;
    this.y += this.vy;

    // Gentle rotation-like sway (visual only via draw)
    this.swayAngle = Math.sin(this.sway)*this.swayAmp;

    // Glow pulse
    this.phase += this.pulseSpd;
    this.glowR = this.baseGlow + 0.3*Math.sin(this.phase);

    // Flame flicker
    this.flicker += this.flickSpd;

    // Fade out near top
    if (this.y < H*0.12) {
      this.alpha -= 0.008;
      if (this.alpha <= 0) this.dead = true;
    }

    // Off-screen sides → wrap gently
    if (this.x < -80) this.x = W+80;
    if (this.x > W+80) this.x = -80;
  }

  draw() {
    if (this.dead) return;
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.swayAngle);

    const hw = this.w/2, hh = this.h/2;
    const {r:gr} = {r: this.col.glow};

    // Outer atmospheric glow
    const outerR = this.w*3.5;
    const outer  = ctx.createRadialGradient(0,0,0,0,0,outerR);
    outer.addColorStop(0,   `rgba(${this.col.glow},${this.glowR*0.35})`);
    outer.addColorStop(0.4, `rgba(${this.col.glow},${this.glowR*0.1})`);
    outer.addColorStop(1,   `rgba(${this.col.glow},0)`);
    ctx.beginPath();
    ctx.ellipse(0,0,outerR,outerR*0.85,0,0,Math.PI*2);
    ctx.fillStyle = outer; ctx.fill();

    // Lantern body — paper balloon shape
    ctx.beginPath();
    ctx.moveTo(0, -hh);
    ctx.bezierCurveTo( hw*1.1, -hh*0.6,  hw*1.2,  hh*0.2,  hw*0.5,  hh);
    ctx.bezierCurveTo( hw*0.2,  hh*1.05, -hw*0.2,  hh*1.05, -hw*0.5, hh);
    ctx.bezierCurveTo(-hw*1.2,  hh*0.2, -hw*1.1, -hh*0.6,  0, -hh);
    ctx.closePath();

    // Paper gradient — glowing from inside
    const bodyGrad = ctx.createRadialGradient(0,-hh*0.1,0,0,0,this.w*0.9);
    bodyGrad.addColorStop(0,   this.col.paper+'ff');
    bodyGrad.addColorStop(0.5, this.col.body+'ee');
    bodyGrad.addColorStop(1,   this.col.body+'88');
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // Paper texture lines (horizontal folds)
    ctx.strokeStyle = `rgba(0,0,0,0.08)`;
    ctx.lineWidth   = 0.5;
    for (let i=-1; i<=1; i++) {
      const ly = i * hh*0.4;
      ctx.beginPath();
      ctx.moveTo(-hw*0.9, ly);
      ctx.bezierCurveTo(-hw*0.5, ly-hh*0.04, hw*0.5, ly-hh*0.04, hw*0.9, ly);
      ctx.stroke();
    }

    // Top ring
    ctx.beginPath();
    ctx.ellipse(0,-hh,hw*0.38,hw*0.12,0,0,Math.PI*2);
    ctx.fillStyle=`rgba(80,40,10,0.5)`; ctx.fill();

    // Bottom opening + string tassels
    ctx.beginPath();
    ctx.ellipse(0,hh,hw*0.32,hw*0.1,0,0,Math.PI*2);
    ctx.fillStyle=`rgba(60,30,5,0.4)`; ctx.fill();

    // Hanging strings
    ctx.strokeStyle=`rgba(180,120,40,0.4)`;
    ctx.lineWidth=0.8;
    for(let s=-1;s<=1;s+=2){
      ctx.beginPath();
      ctx.moveTo(s*hw*0.15, hh*0.9);
      ctx.quadraticCurveTo(s*hw*0.4, hh*1.3, s*hw*0.1, hh*1.5);
      ctx.stroke();
    }

    // Inner flame glow
    const flicker = 0.85 + 0.15*Math.sin(this.flicker);
    const flame   = ctx.createRadialGradient(0, hh*0.1, 0, 0, hh*0.1, hw*0.7*flicker);
    flame.addColorStop(0,   `rgba(255,240,160,${0.85*flicker})`);
    flame.addColorStop(0.3, `rgba(255,180,60,${0.5*flicker})`);
    flame.addColorStop(1,   `rgba(255,120,20,0)`);
    ctx.beginPath();
    ctx.ellipse(0,hh*0.1,hw*0.5,hh*0.4,0,0,Math.PI*2);
    ctx.fillStyle=flame; ctx.fill();

    ctx.restore();
  }
}

/* ── Auto-launch queue ── */
let lanterns = [];
let autoTimer = 0;
const AUTO_INTERVAL = 140; // frames between auto launches

function launch(x, y) {
  lanterns.push(new Lantern(x, y, false));
}

/* ── Background ── */
function drawBG() {
  // Deep night sky gradient
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,   '#06050f');
  bg.addColorStop(0.5, '#080814');
  bg.addColorStop(0.8, '#0d0a18');
  bg.addColorStop(1,   '#12101e');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Moonlight shimmer top-right
  const moonX=W*0.82, moonY=H*0.1;
  const moonAura=ctx.createRadialGradient(moonX,moonY,0,moonX,moonY,W*0.4);
  moonAura.addColorStop(0,'rgba(200,190,255,0.07)');
  moonAura.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=moonAura; ctx.fillRect(0,0,W,H);

  // Moon
  const moonG=ctx.createRadialGradient(moonX,moonY,0,moonX,moonY,28);
  moonG.addColorStop(0,'rgba(240,238,255,0.22)');
  moonG.addColorStop(0.5,'rgba(220,215,255,0.1)');
  moonG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(moonX,moonY,28,0,Math.PI*2);
  ctx.fillStyle=moonG; ctx.fill();
  ctx.beginPath(); ctx.arc(moonX,moonY,10,0,Math.PI*2);
  const mc=ctx.createRadialGradient(moonX,moonY,0,moonX,moonY,10);
  mc.addColorStop(0,'rgba(245,244,255,0.28)');
  mc.addColorStop(1,'rgba(220,218,255,0.05)');
  ctx.fillStyle=mc; ctx.fill();

  // Stars
  const t=Date.now()*0.001;
  STARS.forEach(s=>{
    s.twinkle+=s.twinkleSpd;
    const a=s.a*(0.6+0.4*Math.sin(s.twinkle));
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fillStyle=`rgba(220,220,255,${a})`;
    ctx.fill();
  });

  // Ground / horizon glow
  const horizon=ctx.createLinearGradient(0,H*0.75,0,H);
  horizon.addColorStop(0,'rgba(255,140,40,0.04)');
  horizon.addColorStop(1,'rgba(255,100,20,0.0)');
  ctx.fillStyle=horizon; ctx.fillRect(0,H*0.75,W,H*0.25);
}

/* ── Render ── */
function render() {
  drawBG();

  // Auto-launch
  autoTimer++;
  if (autoTimer >= AUTO_INTERVAL) {
    autoTimer = 0;
    launch();
  }

  // Keep minimum lanterns in sky
  if (lanterns.filter(l=>!l.dead).length < 3) launch();

  lanterns = lanterns.filter(l=>!l.dead);
  lanterns.forEach(l=>{ l.update(); l.draw(); });

  requestAnimationFrame(render);
}

/* ── Events ── */
window.addEventListener('mousemove', e=>{
  mouse.x=e.clientX; mouse.y=e.clientY;
  cursorEl.style.left=e.clientX+'px';
  cursorEl.style.top =e.clientY+'px';
});

window.addEventListener('click', e=>{
  // Launch from click position, rising upward
  for(let i=0;i<2;i++) {
    const l = new Lantern(
      e.clientX + (Math.random()-0.5)*60,
      e.clientY + 20
    );
    lanterns.push(l);
  }
});

window.addEventListener('touchstart', e=>{
  const t=e.touches[0];
  for(let i=0;i<2;i++){
    lanterns.push(new Lantern(
      t.clientX+(Math.random()-0.5)*60,
      t.clientY+20
    ));
  }
},{passive:true});

window.addEventListener('resize',()=>{
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
});

// Seed initial lanterns
for(let i=0;i<4;i++){
  const l = new Lantern();
  l.y = H*0.3 + Math.random()*H*0.5; // already in sky
  l.alpha = Math.random()*0.8;
  l.fadeIn = false;
  lanterns.push(l);
}

render();
</script>
</body>
</html>
