<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桜 | うつろい</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300&family=Shippori+Mincho:wght@300&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    overflow:hidden;
    /* background drawn entirely on canvas — no CSS background to flash through */
    background:#0d0a0f;
    cursor:none;
  }

  canvas {
    position:fixed;
    inset:0;
    display:block;
    z-index:1;
  }

  #cursor {
    position:fixed;
    width:7px; height:7px;
    background:#f2c4ce;
    border-radius:50%;
    pointer-events:none;
    z-index:100;
    transform:translate(-50%,-50%);
    box-shadow:0 0 10px 4px rgba(242,196,206,0.35);
    transition:width .2s, height .2s, opacity .2s;
  }
  #cursor.clicking { width:18px; height:18px; opacity:0.5; }

  #back {
    position:fixed; top:28px; left:36px; z-index:50;
    font-family:'Noto Serif JP',serif; font-weight:200;
    font-size:0.65rem; letter-spacing:0.35em;
    color:rgba(242,196,206,0.3); text-decoration:none;
    transition:color .3s;
  }
  #back:hover { color:rgba(242,196,206,0.8); }

  #title {
    position:fixed; bottom:44px; left:50%;
    transform:translateX(-50%);
    text-align:center; pointer-events:none; z-index:50;
  }
  #title h1 {
    font-family:'Shippori Mincho',serif; font-weight:300;
    font-size:clamp(1.4rem,3vw,2.2rem); letter-spacing:0.4em;
    color:rgba(252,228,236,0.55);
    text-shadow:0 0 30px rgba(242,196,206,0.25);
  }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="c"></canvas>

<a href="../index.html" id="back">← うつろい</a>

<div id="title">
  <h1>桜</h1>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const cursor = document.getElementById('cursor');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;
let mouse  = { x: W/2, y: H/2, active: false };
let petals = [];
let ripples = [];

const COLORS = ['#f2c4ce','#e8a0b0','#fce4ec','#f48fb1','#f9d0da','#ebb8c8'];

/* ── Background drawn on canvas (no CSS layers to flash through) ── */
function drawBG() {
  const bg = ctx.createRadialGradient(W*0.3, H*0.2, 0, W*0.5, H*0.5, W*0.9);
  bg.addColorStop(0, '#1e0a22');
  bg.addColorStop(0.5, '#0d0a0f');
  bg.addColorStop(1, '#080510');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Ambient tints
  ctx.save();
  ctx.globalAlpha = 1;
  const t1 = ctx.createRadialGradient(W*0.2, H*0.3, 0, W*0.2, H*0.3, W*0.5);
  t1.addColorStop(0, 'rgba(180,80,120,0.07)');
  t1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = t1; ctx.fillRect(0,0,W,H);

  const t2 = ctx.createRadialGradient(W*0.8, H*0.7, 0, W*0.8, H*0.7, W*0.5);
  t2.addColorStop(0, 'rgba(120,40,160,0.05)');
  t2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = t2; ctx.fillRect(0,0,W,H);
  ctx.restore();

  // Vignette
  const vign = ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.9);
  vign.addColorStop(0,'rgba(0,0,0,0)');
  vign.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle = vign; ctx.fillRect(0,0,W,H);
}

/* ── Petal shape ── */
function drawPetal(x, y, size, angle, alpha, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.globalAlpha = alpha;

  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.bezierCurveTo( size*0.6, -size*0.8,  size*0.8,  size*0.2,  0,  size);
  ctx.bezierCurveTo(-size*0.8,  size*0.2, -size*0.6, -size*0.8,  0, -size);

  const grad = ctx.createRadialGradient(0, -size*0.3, 0, 0, 0, size*1.2);
  grad.addColorStop(0,   color+'ff');
  grad.addColorStop(0.6, color+'cc');
  grad.addColorStop(1,   color+'22');
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(0, -size*0.9);
  ctx.quadraticCurveTo(size*0.1, 0, 0, size*0.9);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = size*0.04;
  ctx.stroke();

  ctx.restore();
}

/* ── Petal class ── */
class Petal {
  constructor(opts={}) {
    this.x     = opts.x    ?? Math.random()*W;
    this.y     = opts.y    ?? Math.random()*H*-0.5 - 20;
    this.size  = opts.size ?? Math.random()*8+5;
    this.color = COLORS[Math.floor(Math.random()*COLORS.length)];
    this.speedY     = Math.random()*0.8+0.3;
    this.speedX     = (Math.random()-0.5)*0.6;
    this.angle      = Math.random()*Math.PI*2;
    this.spin       = (Math.random()-0.5)*0.03;
    this.wobble     = Math.random()*Math.PI*2;
    this.wobbleSpd  = Math.random()*0.02+0.005;
    this.alpha      = Math.random()*0.5+0.4;
    this.alphaSpd   = (Math.random()-0.5)*0.002;
    this.burst      = opts.burst ?? false;
    if (this.burst) {
      this.vx    = opts.vx ?? 0;
      this.vy    = opts.vy ?? 0;
      this.decay = 0.97;
      this.life  = 1;
    }
  }
  update() {
    this.wobble += this.wobbleSpd;
    if (this.burst) {
      this.x  += this.vx;
      this.y  += this.vy;
      this.vx *= this.decay;
      this.vy  = this.vy*this.decay + 0.15;
      this.angle += this.spin*2;
      this.life  -= 0.012;
      this.alpha  = this.life*0.9;
    } else {
      const dx   = this.x - mouse.x;
      const dy   = this.y - mouse.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < 120 && mouse.active) {
        const force = (120-dist)/120*0.8;
        this.x += (dx/dist)*force;
        this.y += (dy/dist)*force*0.5;
      }
      this.x += this.speedX + Math.sin(this.wobble)*0.4;
      this.y += this.speedY;
      this.angle += this.spin;
      this.alpha += this.alphaSpd;
      this.alpha = Math.max(0.2, Math.min(0.95, this.alpha));
    }
  }
  draw() { drawPetal(this.x, this.y, this.size, this.angle, this.alpha, this.color); }
  isDead() { return this.burst ? this.life<=0 : this.y>H+30; }
}

/* ── Ripple ── */
class Ripple {
  constructor(x,y) { this.x=x; this.y=y; this.r=0; this.alpha=0.45; }
  update() { this.r+=3; this.alpha-=0.013; }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(242,196,206,${this.alpha})`;
    ctx.lineWidth=1; ctx.stroke();
  }
  isDead() { return this.alpha<=0; }
}

function init() {
  petals=[];
  for(let i=0;i<80;i++) petals.push(new Petal({y:Math.random()*H}));
}

function burst(x,y) {
  ripples.push(new Ripple(x,y));
  for(let i=0;i<20;i++){
    const angle=(Math.PI*2/20)*i+Math.random()*0.3;
    const speed=Math.random()*4+1.5;
    petals.push(new Petal({
      x, y, size:Math.random()*7+4, burst:true,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-2,
    }));
  }
}

function render() {
  drawBG();
  ripples = ripples.filter(r=>{ r.update(); r.draw(); return !r.isDead(); });
  petals  = petals.filter( p=>{ p.update(); p.draw(); return !p.isDead(); });
  while(petals.filter(p=>!p.burst).length<80) petals.push(new Petal());
  requestAnimationFrame(render);
}

window.addEventListener('mousemove', e=>{
  mouse.x=e.clientX; mouse.y=e.clientY; mouse.active=true;
  cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px';
});
window.addEventListener('mouseleave',()=>{ mouse.active=false; });
window.addEventListener('click', e=>{
  burst(e.clientX,e.clientY);
  cursor.classList.add('clicking');
  setTimeout(()=>cursor.classList.remove('clicking'),200);
});
window.addEventListener('touchmove',e=>{
  const t=e.touches[0]; mouse.x=t.clientX; mouse.y=t.clientY; mouse.active=true;
},{passive:true});
window.addEventListener('touchstart',e=>{
  const t=e.touches[0]; burst(t.clientX,t.clientY);
},{passive:true});
window.addEventListener('touchend',()=>{ mouse.active=false; });
window.addEventListener('resize',()=>{
  W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; init();
});

init();
render();
</script>
</body>
</html>
