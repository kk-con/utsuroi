<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雪 | うつろい</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300&family=Shippori+Mincho:wght@300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#04080f; cursor:none; }
  canvas { position:fixed; inset:0; display:block; z-index:1; }

  #cursor {
    position:fixed; width:5px; height:5px;
    background:rgba(220,235,255,0.8); border-radius:50%;
    pointer-events:none; z-index:100;
    transform:translate(-50%,-50%);
    box-shadow:0 0 8px 3px rgba(180,210,255,0.25);
  }

  #back {
    position:fixed; top:28px; left:36px; z-index:50;
    font-family:'Noto Serif JP',serif; font-weight:200;
    font-size:0.65rem; letter-spacing:0.35em;
    color:rgba(180,210,255,0.3); text-decoration:none;
    transition:color .3s;
  }
  #back:hover { color:rgba(180,210,255,0.75); }

  #title {
    position:fixed; bottom:44px; left:50%;
    transform:translateX(-50%);
    text-align:center; pointer-events:none; z-index:50;
  }
  #title h1 {
    font-family:'Shippori Mincho',serif; font-weight:300;
    font-size:clamp(1.4rem,3vw,2.2rem); letter-spacing:0.4em;
    color:rgba(210,228,255,0.4);
    text-shadow:0 0 24px rgba(160,200,255,0.15);
  }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="c"></canvas>
<a href="../index.html" id="back">← うつろい</a>
<div id="title"><h1>雪</h1></div>

<script>
const canvas   = document.getElementById('c');
const ctx      = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

/* ── Mouse / wind state ── */
const mouse = { x: W/2, y: H/2 };
let windX    = 0;   // current wind force
let targetWindX = 0;
let lastMX   = mouse.x;
let mouseMoveTimer = null;

/* ── Accumulated snow surface ── */
// Store snow height per column (in pixels from bottom)
const COL_W   = 6;  // px per column
let   cols    = [];
function initCols() {
  cols = new Array(Math.ceil(W / COL_W)).fill(0);
}
initCols();

const MAX_SNOW_H = H * 0.38; // max accumulation height

/* ── Snowflake ── */
class Flake {
  constructor(fromTop) {
    this.reset(fromTop);
  }
  reset(fromTop) {
    this.x    = Math.random() * (W + 80) - 40;
    this.y    = fromTop ? -Math.random()*H*0.3 - 5 : Math.random()*H;
    this.r    = 0.8 + Math.random()*2.2;
    this.vy   = 0.4 + Math.random()*0.7 + this.r*0.15;
    this.vx   = (Math.random()-0.5)*0.3;
    this.wobble    = Math.random()*Math.PI*2;
    this.wobbleSpd = 0.012 + Math.random()*0.018;
    this.wobbleAmp = 0.18 + Math.random()*0.25;
    this.alpha = 0.55 + Math.random()*0.4;
    this.landed = false;
  }

  update() {
    this.wobble += this.wobbleSpd;

    // Wind influence
    this.vx += (windX - this.vx) * 0.04;

    this.x += this.vx + Math.sin(this.wobble)*this.wobbleAmp;
    this.y += this.vy;

    // Wrap horizontal
    if (this.x < -10) this.x = W+10;
    if (this.x > W+10) this.x = -10;

    // Check if landed on snow surface
    const col = Math.floor(this.x / COL_W);
    if (col >= 0 && col < cols.length) {
      const snowTop = H - cols[col];
      if (this.y >= snowTop - this.r) {
        // Accumulate
        const spread = Math.floor(this.r * 1.2);
        for (let i = -spread; i <= spread; i++) {
          const c = col + i;
          if (c >= 0 && c < cols.length) {
            const dist = Math.abs(i) / (spread+1);
            const add  = (1 - dist) * this.r * 0.22;
            cols[c] = Math.min(cols[c] + add, MAX_SNOW_H);
          }
        }
        // Smooth neighbors slightly
        if (col > 0 && col < cols.length-1) {
          cols[col] = (cols[col-1]*0.1 + cols[col]*0.8 + cols[col+1]*0.1);
        }
        this.landed = true;
      }
    }
    // Off bottom (past snow)
    if (this.y > H + 10) this.landed = true;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(225,238,255,${this.alpha})`;
    ctx.fill();

    // Soft glow for larger flakes
    if (this.r > 1.8) {
      const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*3);
      g.addColorStop(0, `rgba(200,220,255,${this.alpha*0.3})`);
      g.addColorStop(1, `rgba(200,220,255,0)`);
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.r*3,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    }
  }
}

/* ── Snow surface drawing ── */
function drawSnowSurface() {
  if (cols.every(c => c < 0.5)) return;

  ctx.save();

  // Main snow body
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let i = 0; i < cols.length; i++) {
    const x = i * COL_W;
    const y = H - cols[i];
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();

  const snowGrad = ctx.createLinearGradient(0, H - MAX_SNOW_H, 0, H);
  snowGrad.addColorStop(0,   'rgba(210,228,250,0.95)');
  snowGrad.addColorStop(0.3, 'rgba(200,220,245,0.97)');
  snowGrad.addColorStop(1,   'rgba(190,215,242,1)');
  ctx.fillStyle = snowGrad;
  ctx.fill();

  // Surface highlight — top edge shimmer
  ctx.beginPath();
  ctx.moveTo(0, H - cols[0]);
  for (let i = 1; i < cols.length; i++) {
    ctx.lineTo(i * COL_W, H - cols[i]);
  }
  ctx.strokeStyle = 'rgba(240,248,255,0.6)';
  ctx.lineWidth   = 1.2;
  ctx.stroke();

  // Shadow at base
  const shadow = ctx.createLinearGradient(0, H-8, 0, H);
  shadow.addColorStop(0, 'rgba(100,130,180,0.12)');
  shadow.addColorStop(1, 'rgba(80,110,160,0.0)');
  ctx.fillStyle = shadow;
  ctx.fillRect(0, H-8, W, 8);

  ctx.restore();
}

/* ── Background ── */
function drawBG() {
  // Deep cold night
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0,   '#04080f');
  bg.addColorStop(0.4, '#060b14');
  bg.addColorStop(0.75,'#080e18');
  bg.addColorStop(1,   '#0a1020');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Cold blue ambient
  const amb = ctx.createRadialGradient(W*0.5, H*0.2, 0, W*0.5, H*0.4, W*0.7);
  amb.addColorStop(0, 'rgba(80,120,200,0.06)');
  amb.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle=amb; ctx.fillRect(0,0,W,H);

  // Moon — pale, cold
  const mx=W*0.72, my=H*0.15;
  const moonAura=ctx.createRadialGradient(mx,my,0,mx,my,W*0.35);
  moonAura.addColorStop(0,'rgba(180,200,240,0.06)');
  moonAura.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=moonAura; ctx.fillRect(0,0,W,H);

  const moonG=ctx.createRadialGradient(mx,my,0,mx,my,22);
  moonG.addColorStop(0,'rgba(230,238,255,0.2)');
  moonG.addColorStop(0.5,'rgba(210,225,255,0.08)');
  moonG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(mx,my,22,0,Math.PI*2);
  ctx.fillStyle=moonG; ctx.fill();

  const mc=ctx.createRadialGradient(mx,my,0,mx,my,9);
  mc.addColorStop(0,'rgba(240,245,255,0.25)');
  mc.addColorStop(1,'rgba(220,232,255,0.04)');
  ctx.beginPath(); ctx.arc(mx,my,9,0,Math.PI*2);
  ctx.fillStyle=mc; ctx.fill();

  // Distant treeline silhouette — bare winter trees
  drawTrees();

  // Vignette
  const vign=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.95);
  vign.addColorStop(0,'rgba(0,0,0,0)');
  vign.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=vign; ctx.fillRect(0,0,W,H);
}

/* ── Bare winter trees ── */
function drawTrees() {
  ctx.save();
  ctx.fillStyle = 'rgba(5,8,15,0.97)';

  const treeY = H * 0.68;
  const snowOnGround = cols.length > 0
    ? cols.reduce((a,b)=>a+b,0)/cols.length
    : 0;
  const baseY = H - snowOnGround * 0.4;

  // Simple silhouette — low rolling hills with sparse tree tops
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(0, treeY);

  const points = [
    [0,      treeY],
    [W*0.08, treeY - 8],
    [W*0.14, treeY - 22],  // small tree
    [W*0.18, treeY - 5],
    [W*0.26, treeY - 14],
    [W*0.32, treeY - 28],  // taller tree
    [W*0.36, treeY - 10],
    [W*0.45, treeY - 4],
    [W*0.52, treeY - 18],
    [W*0.58, treeY - 30],  // tallest
    [W*0.63, treeY - 12],
    [W*0.70, treeY - 6],
    [W*0.76, treeY - 20],
    [W*0.82, treeY - 8],
    [W*0.88, treeY - 15],
    [W*0.93, treeY - 4],
    [W,      treeY],
  ];

  ctx.moveTo(0, H);
  ctx.lineTo(points[0][0], points[0][1]);
  for (let i=1; i<points.length; i++) {
    const prev = points[i-1];
    const curr = points[i];
    const mx   = (prev[0]+curr[0])/2;
    ctx.quadraticCurveTo(prev[0], prev[1], mx, (prev[1]+curr[1])/2);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

/* ── Init flakes ── */
let flakes = Array.from({length: 200}, () => new Flake(false));

/* ── Render ── */
function render() {
  drawBG();
  drawSnowSurface();

  // Wind easing
  windX += (targetWindX - windX) * 0.05;
  targetWindX *= 0.97; // decay wind naturally

  // Update flakes
  flakes = flakes.filter(f => {
    f.update(); f.draw(); return !f.landed;
  });

  // Replenish
  while (flakes.length < 200) flakes.push(new Flake(true));

  requestAnimationFrame(render);
}

/* ── Events ── */
window.addEventListener('mousemove', e => {
  const dx = e.clientX - lastMX;
  lastMX   = e.clientX;
  mouse.x  = e.clientX;
  mouse.y  = e.clientY;

  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';

  // Mouse horizontal speed → wind
  targetWindX = dx * 0.18;

  // Wind dies down after mouse stops
  clearTimeout(mouseMoveTimer);
  mouseMoveTimer = setTimeout(() => { targetWindX = 0; }, 120);
});

window.addEventListener('touchmove', e => {
  const t  = e.touches[0];
  const dx = t.clientX - lastMX;
  lastMX   = t.clientX;
  targetWindX = dx * 0.18;
  clearTimeout(mouseMoveTimer);
  mouseMoveTimer = setTimeout(() => { targetWindX = 0; }, 120);
}, { passive: true });

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initCols();
});

render();
</script>
</body>
</html>
